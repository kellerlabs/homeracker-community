---
name: Automerge Release PRs

on:
  schedule:
    # Run every Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Allow manual triggering

permissions: {}

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASES_APP_ID }}
          private-key: ${{ secrets.RELEASES_APP_PRIVATE_KEY }}

      - name: Enable auto-merge for release PRs
        run: |
          prs=$(gh pr list --label "automerge" --label "autorelease: pending" --json number --jq '.[].number')
          for pr in $prs; do
            echo "Enabling auto-merge for PR #${pr}"
            gh pr merge --auto --squash "$pr" || true
          done
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
